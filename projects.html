---
layout: default
title: "Projects"
permalink: /projects/
---

<h1>Projects</h1>
<ul>
  {% for project in site.projects %}
    <li>
      <a href="{{ project.url | relative_url }}">{{ project.title }}</a> - {{ project.description }}
      <br>
      <small>{{ project.date | date: "%Y.%m.%d" }}</small>
    </li>
  {% endfor %}
</ul>
