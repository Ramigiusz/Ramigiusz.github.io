title: "Rami Matouk"
author: "Rami Matouk"
description: "Thanks for stopping by! Feel free to connect with me through these platforms:"
permalink: /:title/
lang: "en"
excerpt_separator: "\n\n\n"
date_format: "%d.%m.%Y"

# collections
collections:
  projects:
    output: true
    permalink: /projects/:title/
# Layout

show_excerpts: false        # show article excerpts on the home page
show_frame: true           # adds a gray frame to the site
show_sidebar: false        # show a sidebar instead of the usual header
minimal: false             # use a dark header

# Menu
navigation:                # accepts {file, title, url, icon, sidebaricon}
  - {file: "index.md", title: "Home"}  
  - {file: "projects.md", title: "Projects"} 
  - {file: "blog.md", title: "Blog"}                           
  


external:                  # shows a footer with social links - for available icons see fontawesome.com/icons
  - {title: Mail, icon: envelope, url: "ramimatouk331@gmail.com"}
  - {title: Github, icon: github, url: "https://github.com/Ramigiusz"}
  - {title: LinkedIn, icon: linkedin, url: "https://www.linkedin.com/in/ramimatouk/"}


comments:
