title: "Rami Matouk"
author: "Rami Matouk"
description: "Every connection is an opportunity. Let's connect and create something amazing together"
permalink: /:title/
lang: "en"
excerpt_separator: "\n\n\n"
date_format: "%B %d, %Y"

# Layout

show_excerpts: false        # show article excerpts on the home page
show_frame: true           # adds a gray frame to the site
show_sidebar: false        # show a sidebar instead of the usual header
minimal: false             # use a dark header

# Menu
navigation:                # accepts {file, title, url, icon, sidebaricon}
  - {file: "index.html", title: "Home", icon: home}
  - {file: "README.md", title: "Projects", icon: folder-open} 
  - {file: "blog.md", title: "Blog", icon: pen}            
  - {file: "rami.pdf", title: "CV", icon: file-pdf}                  



external:                  # shows a footer with social links - for available icons see fontawesome.com/icons
  - {title: Mail, icon: envelope, url: ""}
  - {title: Github, icon: github, url: ""}
  - {title: LinkedIn, icon: linkedin, url: "/feed.xml"}


comments:
