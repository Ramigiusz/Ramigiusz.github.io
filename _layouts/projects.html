---
layout: default
---

<article>
  <header>
    <h1>{{ page.title }}</h1>
    <p>{{ page.description }}</p>
    {%- assign date_format = site.date_format | default: "%Y.%m.%d" -%}
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: date_format }}</time>
  </header>
  <div>
    {{ content }}
  </div>
</article>
